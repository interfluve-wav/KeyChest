name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
change-title-escapes: '\<*_&`'

categories:
  - title: "Security"
    labels:
      - security
      - auth
      - encryption
  - title: "Proxy & Agent Chest"
    labels:
      - proxy
      - agent-chest
      - networking
  - title: "UI/UX"
    labels:
      - ui
      - ux
      - frontend
  - title: "Maintenance"
    labels:
      - chore
      - docs
      - ci

exclude-labels:
  - skip-changelog

template: |
  ## What's Changed

  $CHANGES

  ## Install

  1. Download the latest macOS artifact from this release.
  2. Open KeyNest and verify Proxy health from the Proxy tab.

  ## Hashtags

  #KeyNest #AgentChest #Tauri #Rust #Go #AIInfrastructure
